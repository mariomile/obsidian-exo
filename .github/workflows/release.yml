name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$MANIFEST_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag ($GITHUB_REF_NAME)"
            exit 1
          fi

      - name: Enable pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release check
        run: pnpm release:check

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS="main.js manifest.json"
          [ -f styles.css ] && ASSETS="$ASSETS styles.css"
          # Idempotent: releases are usually cut manually (curated notes) before
          # the tag lands here. If one exists, refresh its assets with this
          # CI-built bundle instead of failing.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists — updating assets"
            gh release upload "$GITHUB_REF_NAME" $ASSETS --clobber
          else
            gh release create "$GITHUB_REF_NAME" $ASSETS \
              --title "$(node -p "require('./manifest.json').name") $GITHUB_REF_NAME" \
              --generate-notes
          fi
